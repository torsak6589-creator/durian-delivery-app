<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>บันทึกข้อมูลการจัดส่งทุเรียน — FF Branch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0d;
    --card: #1a1a17;
    --card2: #222220;
    --text: #e8e6df;
    --muted: #8a8a7a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --gold: #d4a435;
    --gold-light: #f0c055;
    --success: #22c55e;
    --success-bg: #052e16;
    --danger: #f87171;
    --danger-bg: #2d0a0a;
    --mono: 'DM Mono', monospace;
    --font: 'Noto Sans Thai', sans-serif;
  }
  body { background: var(--bg); font-family: var(--font); color: var(--text); min-height: 100vh; }
  input[type=text], input[type=number], input[type=date] {
    background: var(--card2); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text); padding: 7px 10px;
    font-size: 14px; font-family: var(--font); outline: none;
    transition: border-color .15s;
  }
  input:focus { border-color: var(--gold); }
  input[type=number] { text-align: right; }
  button { cursor: pointer; font-family: var(--font); }
  table { border-collapse: collapse; }
  .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>
</head>
<body>
<div id="root"></div>
<script src="helpers.js"></script>
<script src="db.js"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
